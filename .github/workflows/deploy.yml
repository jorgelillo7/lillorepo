name: Deploy to Cloud Run

# Triggers:
# - push to master: auto-deploys modules whose code changed (via paths-filter).
# - workflow_dispatch: manual trigger to redeploy when a push event was missed
#   (e.g. PR #72 merged but GH never delivered the push event, so the api
#   deploy never ran — see PR #73 nudge attempt that also failed because the
#   per-module paths-filter only diffs the nudge commit, not the missed one).
#   Manual runs deploy every module by default; toggle inputs to scope.

on:
  push:
    branches: [master]
    paths:
      - "core/**"
      - "packages/biwenger_tools/web/**"
      - "packages/biwenger_tools/scraper_job/**"
      - "packages/biwenger_tools/bot/**"
      - "packages/biwenger_tools/api/**"
      - "packages/chucknorris_bot/**"
      - "tools/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy biwenger-api"
        type: boolean
        default: true
      deploy_web:
        description: "Deploy web app"
        type: boolean
        default: true
      deploy_bot:
        description: "Deploy biwenger bot"
        type: boolean
        default: true
      deploy_scraper:
        description: "Deploy scraper job"
        type: boolean
        default: true
      deploy_chucknorris_bot:
        description: "Deploy Chuck Norris bot"
        type: boolean
        default: true

env:
  REGION: europe-southwest1
  PROJECT_ID: biwenger-tools
  REGISTRY: europe-southwest1-docker.pkg.dev/biwenger-tools/biwenger-docker
  TEMPORADA_ACTUAL: "25-26"

jobs:
  # -------------------------------------------------------
  # 0. Lint Python code (flake8 + black --check) via the Bazel toolchain
  # -------------------------------------------------------
  # Black and flake8 are run via `bazel run //tools/lint:...` using the
  # repository's hermetic Python 3.13 toolchain. The exact same command is
  # what `scripts/lint.sh` invokes locally — no Python-version drift between
  # devs and CI.
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Lint
        run: bash scripts/lint.sh

  # -------------------------------------------------------
  # 0b. Detect which modules have changed
  # -------------------------------------------------------
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      scraper: ${{ steps.filter.outputs.scraper }}
      bot: ${{ steps.filter.outputs.bot }}
      api: ${{ steps.filter.outputs.api }}
      chucknorris_bot: ${{ steps.filter.outputs.chucknorris_bot }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/web/**'
            scraper:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/scraper_job/**'
            bot:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/bot/**'
            api:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/api/**'
            chucknorris_bot:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/chucknorris_bot/**'

  # -------------------------------------------------------
  # 1. Run all tests before any deployment
  # -------------------------------------------------------
  test:
    name: Run tests
    needs: [detect-changes, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Run all tests
        run: |
          bazel test \
            //core:core_tests \
            //packages/biwenger_tools/web:web_tests \
            //packages/biwenger_tools/scraper_job:scraper_job_tests \
            //packages/biwenger_tools/bot:bot_tests \
            //packages/biwenger_tools/api:api_tests \
            //packages/chucknorris_bot/bot:bot_tests \
            --test_output=streamed --test_arg=-v

  # -------------------------------------------------------
  # 2a. Build and deploy web app (only if web changed)
  # -------------------------------------------------------
  deploy-web:
    name: Deploy web app
    needs: [detect-changes, test]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.web == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push web image
        run: |
          bazel run //packages/biwenger_tools/web:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy biwenger-summary \
            --image ${{ env.REGISTRY }}/web \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --update-secrets=/gdrive_sa/biwenger-tools-sa.json=biwenger-tools-sa-regional:latest \
            --set-env-vars="\
          TEMPORADA_ACTUAL=${{ env.TEMPORADA_ACTUAL }},\
          GCP_PROJECT_ID=${{ env.PROJECT_ID }},\
          CLOUD_RUN_JOB_NAME=biwenger-scraper-data,\
          CLOUD_RUN_REGION=${{ env.REGION }},\
          SECRET_KEY=${{ secrets.SECRET_KEY }},\
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }},\
          LIGAS_ESPECIALES_SHEET_ID_25_26=${{ secrets.LIGAS_ESPECIALES_SHEET_ID_25_26 }},\
          TROFEOS_SHEET_ID_25_26=${{ secrets.TROFEOS_SHEET_ID_25_26 }},\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 2b. Build and update scraper Cloud Run Job (only if scraper changed)
  # -------------------------------------------------------
  deploy-scraper:
    name: Deploy scraper job
    needs: [detect-changes, test]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.scraper == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_scraper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push scraper image
        run: |
          bazel run //packages/biwenger_tools/scraper_job:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update biwenger-scraper-data \
            --image ${{ env.REGISTRY }}/scraper_job \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --update-env-vars TEMPORADA_ACTUAL=${{ env.TEMPORADA_ACTUAL }} \
            --update-secrets="BIWENGER_CREDENTIALS_JSON=biwenger-credentials-regional:latest,TELEGRAM_BOT_CONFIG_JSON=telegram-bot-config-regional:latest"

  # -------------------------------------------------------
  # 2c. Build and deploy bot Cloud Run Service
  # -------------------------------------------------------
  deploy-bot:
    name: Deploy bot service
    needs: [detect-changes, test]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.bot == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push bot image
        run: |
          bazel run //packages/biwenger_tools/bot:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Resolve biwenger-api URL
        id: api_url
        run: |
          URL=$(gcloud run services describe biwenger-api \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy bot to Cloud Run
        run: |
          gcloud run deploy biwenger-bot \
            --image ${{ env.REGISTRY }}/bot \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=0.5 \
            --concurrency=1 \
            --update-secrets="TELEGRAM_BOT_CONFIG_JSON=telegram-bot-config-regional:latest" \
            --set-env-vars="\
          BIWENGER_API_URL=${{ steps.api_url.outputs.url }},\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

      - name: Refresh bot commands + webhook
        # Idempotent post-deploy hook. Refreshes the `/`-menu so command
        # additions/removals reach Telegram, and re-registers the webhook
        # with `allowed_updates=[message, callback_query]` so inline keyboards
        # keep working. The latter is what dropped on 2026-05-21 — without
        # `callback_query` in `allowed_updates`, Telegram silently drops
        # menu taps.
        run: |
          CFG=$(gcloud secrets versions access latest \
            --secret=telegram-bot-config-regional --project=${{ env.PROJECT_ID }})
          TELEGRAM_BOT_TOKEN=$(echo "$CFG" | jq -r .bot_token)
          TELEGRAM_WEBHOOK_SECRET=$(echo "$CFG" | jq -r .webhook_secret)
          BOT_URL=$(gcloud run services describe biwenger-bot \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          pip install --quiet requests python-dotenv python-json-logger
          PYTHONPATH=. \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_WEBHOOK_SECRET="$TELEGRAM_WEBHOOK_SECRET" \
            BIWENGER_BOT_URL="${BOT_URL}/telegram/webhook" \
            python3 packages/biwenger_tools/bot/setup_commands.py

  # -------------------------------------------------------
  # 2d. Build and deploy biwenger-api Cloud Run Service
  # -------------------------------------------------------
  deploy-api:
    name: Deploy biwenger API service
    needs: [detect-changes, test]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.api == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push biwenger-api image
        run: |
          bazel run //packages/biwenger_tools/api:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy biwenger-api to Cloud Run
        run: |
          gcloud run deploy biwenger-api \
            --image ${{ env.REGISTRY }}/api \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --no-allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=10 \
            --update-secrets="BIWENGER_CREDENTIALS_JSON=biwenger-credentials-regional:latest,TELEGRAM_BOT_CONFIG_JSON=telegram-bot-config-regional:latest" \
            --set-env-vars="\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 2e. Build and deploy Chuck Norris bot Cloud Run Service
  # -------------------------------------------------------
  deploy-chucknorris-bot:
    name: Deploy Chuck Norris bot service
    needs: [detect-changes, test]
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.chucknorris_bot == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_chucknorris_bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push Chuck Norris bot image
        run: |
          bazel run //packages/chucknorris_bot/bot:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy Chuck Norris bot to Cloud Run
        run: |
          gcloud run deploy chucknorris-bot \
            --image ${{ env.REGISTRY }}/chucknorris_bot \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=0.5 \
            --concurrency=1 \
            --update-secrets="CHUCKNORRIS_BOT_CONFIG_JSON=chucknorris-bot-config-regional:latest" \
            --set-env-vars="\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 3. Clean up old images once any deploy succeeds
  # -------------------------------------------------------
  cleanup:
    name: Clean up old images
    needs: [deploy-web, deploy-scraper, deploy-bot, deploy-api, deploy-chucknorris-bot]
    if: always() && (needs.deploy-web.result == 'success' || needs.deploy-scraper.result == 'success' || needs.deploy-bot.result == 'success' || needs.deploy-api.result == 'success' || needs.deploy-chucknorris-bot.result == 'success')
    # Serialize cleanups across concurrent deploys. Without this, two cleanup
    # runs racing on the same orphan digest would both call `gcloud images
    # delete` — the loser hits NOT_FOUND and fails the job (observed on the
    # 4-PR auto-bid stack merge, 2026-05-24). `cancel-in-progress: false`
    # queues instead of cancelling so every deploy still gets a cleanup.
    concurrency:
      group: cleanup-artifact-registry
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Delete old images from Artifact Registry
        run: ./scripts/clean-images-artifact.sh
