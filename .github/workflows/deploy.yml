name: Deploy to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "core/**"
      - "packages/biwenger_tools/web/**"
      - "packages/biwenger_tools/scraper_job/**"
      - "packages/biwenger_tools/teams_analyzer/**"
      - "packages/biwenger_tools/telegram_bot/**"
      - "packages/biwenger_tools/api/**"
      - "packages/chucknorris_bot/**"
      - "tools/**"
      - ".github/workflows/deploy.yml"

env:
  REGION: europe-southwest1
  PROJECT_ID: biwenger-tools
  REGISTRY: europe-southwest1-docker.pkg.dev/biwenger-tools/biwenger-docker
  TEMPORADA_ACTUAL: "25-26"

jobs:
  # -------------------------------------------------------
  # 0. Lint Python code (flake8 + black --check)
  # -------------------------------------------------------
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install lint tools
        # Pinned to match versions resolved in requirements_lock.txt;
        # bump both files in sync if you upgrade.
        run: pip install flake8==7.3.0 black==26.3.1

      - name: Run flake8
        run: flake8 core/ packages/

      - name: Check formatting with black
        run: black --check core/ packages/

  # -------------------------------------------------------
  # 0b. Detect which modules have changed
  # -------------------------------------------------------
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      scraper: ${{ steps.filter.outputs.scraper }}
      teams_analyzer: ${{ steps.filter.outputs.teams_analyzer }}
      telegram_bot: ${{ steps.filter.outputs.telegram_bot }}
      api: ${{ steps.filter.outputs.api }}
      chucknorris_bot: ${{ steps.filter.outputs.chucknorris_bot }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/web/**'
            scraper:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/scraper_job/**'
            teams_analyzer:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/teams_analyzer/**'
            telegram_bot:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/telegram_bot/**'
            api:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/biwenger_tools/api/**'
            chucknorris_bot:
              - 'core/**'
              - 'tools/**'
              - 'docker/**'
              - 'MODULE.bazel'
              - 'packages/chucknorris_bot/**'

  # -------------------------------------------------------
  # 1. Run all tests before any deployment
  # -------------------------------------------------------
  test:
    name: Run tests
    needs: [detect-changes, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Run all tests
        run: |
          bazel test \
            //core:core_tests \
            //packages/biwenger_tools/web:web_tests \
            //packages/biwenger_tools/scraper_job:scraper_job_tests \
            //packages/biwenger_tools/teams_analyzer:teams_analyzer_tests \
            //packages/biwenger_tools/telegram_bot:telegram_bot_tests \
            //packages/biwenger_tools/api:api_tests \
            //packages/chucknorris_bot/bot:bot_tests \
            --test_output=streamed --test_arg=-v

  # -------------------------------------------------------
  # 2a. Build and deploy web app (only if web changed)
  # -------------------------------------------------------
  deploy-web:
    name: Deploy web app
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push web image
        run: |
          bazel run //packages/biwenger_tools/web:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy biwenger-summary \
            --image ${{ env.REGISTRY }}/web \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --update-secrets=/gdrive_sa/biwenger-tools-sa.json=biwenger-tools-sa-regional:latest \
            --set-env-vars="\
          TEMPORADA_ACTUAL=${{ env.TEMPORADA_ACTUAL }},\
          GDRIVE_FOLDER_ID=${{ secrets.GDRIVE_FOLDER_ID }},\
          GCP_PROJECT_ID=${{ env.PROJECT_ID }},\
          CLOUD_RUN_JOB_NAME=biwenger-scraper-data,\
          CLOUD_RUN_REGION=${{ env.REGION }},\
          SECRET_KEY=${{ secrets.SECRET_KEY }},\
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }},\
          LIGAS_ESPECIALES_SHEET_ID_25_26=${{ secrets.LIGAS_ESPECIALES_SHEET_ID_25_26 }},\
          LIGAS_ESPECIALES_SHEET_ID_24_25=${{ secrets.LIGAS_ESPECIALES_SHEET_ID_24_25 }},\
          TROFEOS_SHEET_ID_25_26=${{ secrets.TROFEOS_SHEET_ID_25_26 }},\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 2b. Build and update scraper Cloud Run Job (only if scraper changed)
  # -------------------------------------------------------
  deploy-scraper:
    name: Deploy scraper job
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push scraper image
        run: |
          bazel run //packages/biwenger_tools/scraper_job:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update biwenger-scraper-data \
            --image ${{ env.REGISTRY }}/scraper_job \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --update-env-vars TEMPORADA_ACTUAL=${{ env.TEMPORADA_ACTUAL }} \
            --update-secrets="BIWENGER_CREDENTIALS_JSON=biwenger-credentials-regional:latest"

  # -------------------------------------------------------
  # 2c. Build and update teams_analyzer Cloud Run Job (only if teams_analyzer changed)
  # -------------------------------------------------------
  deploy-teams-analyzer:
    name: Deploy teams_analyzer job
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.teams_analyzer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push teams_analyzer image
        run: |
          bazel run //packages/biwenger_tools/teams_analyzer:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update biwenger-teams-analyzer \
            --image ${{ env.REGISTRY }}/teams_analyzer \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

  # -------------------------------------------------------
  # 2d. Build and deploy telegram bot Cloud Run Service
  # -------------------------------------------------------
  deploy-telegram-bot:
    name: Deploy telegram bot service
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.telegram_bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push telegram bot image
        run: |
          bazel run //packages/biwenger_tools/telegram_bot:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy telegram bot to Cloud Run
        run: |
          gcloud run deploy biwenger-telegram-bot \
            --image ${{ env.REGISTRY }}/telegram_bot \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=0.5 \
            --concurrency=1 \
            --update-secrets="TELEGRAM_BOT_CONFIG_JSON=telegram-bot-config-regional:latest" \
            --set-env-vars="\
          GCP_PROJECT_ID=${{ env.PROJECT_ID }},\
          CLOUD_RUN_REGION=${{ env.REGION }},\
          CLOUD_RUN_JOB_NAME=biwenger-teams-analyzer,\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 2e. Build and deploy biwenger-api Cloud Run Service
  # -------------------------------------------------------
  deploy-api:
    name: Deploy biwenger API service
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push biwenger-api image
        run: |
          bazel run //packages/biwenger_tools/api:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy biwenger-api to Cloud Run
        run: |
          gcloud run deploy biwenger-api \
            --image ${{ env.REGISTRY }}/api \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --no-allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=10 \
            --update-secrets="BIWENGER_CREDENTIALS_JSON=biwenger-credentials-regional:latest,TELEGRAM_BOT_CONFIG_JSON=telegram-bot-config-regional:latest" \
            --set-env-vars="\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 2f. Build and deploy Chuck Norris bot Cloud Run Service
  # -------------------------------------------------------
  deploy-chucknorris-bot:
    name: Deploy Chuck Norris bot service
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.chucknorris_bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}

      - name: Build and push Chuck Norris bot image
        run: |
          bazel run //packages/chucknorris_bot/bot:push_image_to_gcp \
            --platforms=//platforms:linux_amd64

      - name: Deploy Chuck Norris bot to Cloud Run
        run: |
          gcloud run deploy chucknorris-bot \
            --image ${{ env.REGISTRY }}/chucknorris_bot \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=0.5 \
            --concurrency=1 \
            --update-secrets="CHUCKNORRIS_BOT_CONFIG_JSON=chucknorris-bot-config-regional:latest" \
            --set-env-vars="\
          GIT_COMMIT=${GITHUB_SHA::7},\
          DEPLOY_TIME=$(TZ=Europe/Madrid date '+%d/%m/%Y %H:%M')"

  # -------------------------------------------------------
  # 3. Clean up old images once any deploy succeeds
  # -------------------------------------------------------
  cleanup:
    name: Clean up old images
    needs: [deploy-web, deploy-scraper, deploy-teams-analyzer, deploy-telegram-bot, deploy-api, deploy-chucknorris-bot]
    if: always() && (needs.deploy-web.result == 'success' || needs.deploy-scraper.result == 'success' || needs.deploy-teams-analyzer.result == 'success' || needs.deploy-telegram-bot.result == 'success' || needs.deploy-api.result == 'success' || needs.deploy-chucknorris-bot.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Delete old images from Artifact Registry
        run: ./scripts/clean-images-artifact.sh
