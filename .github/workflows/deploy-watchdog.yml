# Watchdog for lost GitHub push events (the "PR #72 syndrome"): merges have
# landed on master with no deploy run because GitHub dropped the push event,
# and the workflow can't guard itself (no event → no run). This scheduled
# check compares master HEAD against the latest deploy run's snapshot and
# dispatches a full deploy when deployable paths drifted.
name: Deploy watchdog

on:
  schedule:
    - cron: "47 7 * * *" # daily ~09:47 Madrid, after the usual merge hours
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-drift:
    name: Compare master vs last deploy run
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need history to diff against the last run's sha

      - name: Detect drift and dispatch
        run: |
          LATEST=$(gh api "repos/${{ github.repository }}/actions/workflows/deploy.yml/runs?branch=master&per_page=1" \
            --jq '.workflow_runs[0] | "\(.head_sha) \(.status)"')
          LAST_SHA=$(echo "$LATEST" | awk '{print $1}')
          LAST_STATUS=$(echo "$LATEST" | awk '{print $2}')
          HEAD_SHA=$(git rev-parse HEAD)
          echo "master HEAD: $HEAD_SHA"
          echo "last deploy run: $LAST_SHA ($LAST_STATUS)"

          if [ "$LAST_SHA" = "$HEAD_SHA" ]; then
            echo "✅ Last deploy run matches master HEAD — no drift."
            exit 0
          fi
          if [ "$LAST_STATUS" != "completed" ]; then
            echo "⏳ A deploy run is still $LAST_STATUS — not judging drift yet."
            exit 0
          fi

          # Docs-only merges legitimately produce no run: only dispatch when
          # something under the deployable paths changed since the last run.
          if ! git cat-file -e "$LAST_SHA" 2>/dev/null; then
            echo "⚠️ Last run sha not in history (force-push?) — dispatching to be safe."
            gh workflow run deploy.yml --ref master
            exit 0
          fi
          # Mirror deploy.yml's `on.push.paths` exactly — a wider filter here
          # would dispatch full deploys for changes deploy.yml ignores.
          CHANGED=$(git diff --name-only "$LAST_SHA"..HEAD -- \
            core/ tools/ docker/ MODULE.bazel \
            packages/biwenger_tools/ packages/chucknorris_bot/ packages/be_water/ \
            .github/workflows/deploy.yml)
          if [ -z "$CHANGED" ]; then
            echo "✅ Only non-deployable paths changed since $LAST_SHA — no drift."
            exit 0
          fi
          echo "🚨 Drift detected — deployable changes without a deploy run:"
          echo "$CHANGED" | sed 's/^/  - /'
          gh workflow run deploy.yml --ref master
          echo "Dispatched deploy.yml on master."
