{% extends "base.html" %}

{% block title %}Añadir agua · Be Water{% endblock %}

{% block content %}
<header class="text-center mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">＋ Añadir agua</h1>
    <p class="mt-2 text-slate-500 text-sm max-w-md mx-auto">
        Copia los datos de la etiqueta. Pronto bastará con una foto 📸
    </p>
</header>

<form method="post" class="max-w-xl mx-auto bg-white rounded-3xl ring-1 ring-slate-200 p-6 sm:p-8 space-y-5">
    <div class="grid sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="name">Nombre *</label>
            <input id="name" name="name" required placeholder="Agua de Benassal"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="spring">Manantial</label>
            <input id="spring" name="spring" placeholder="Font d'en Segures"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="brand">Marca</label>
            <input id="brand" name="brand" placeholder="(si difiere del nombre)"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="province">Provincia</label>
            <input id="province" name="province" placeholder="Castellón"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="community">Comunidad</label>
            <input id="community" name="community" placeholder="Comunidad Valenciana"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        </div>
    </div>

    <label class="flex items-center gap-2 text-sm text-slate-600">
        <input type="checkbox" name="sparkling" class="rounded text-sky-500 focus:ring-sky-400"> 🫧 Con gas
    </label>

    <fieldset>
        <legend class="text-sm font-semibold text-slate-700 mb-2">Composición (mg/L) — deja en blanco lo que no aparezca</legend>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            {% for field in mineral_fields %}
            <div>
                <label class="block text-xs text-slate-500 mb-1" for="{{ field }}">{{ mineral_labels[field] }}</label>
                <input id="{{ field }}" name="{{ field }}" inputmode="decimal" placeholder="—"
                       class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm tabular-nums focus:outline-none focus:ring-2 focus:ring-sky-400">
            </div>
            {% endfor %}
        </div>
    </fieldset>

    <button class="w-full py-3 rounded-2xl bg-sky-500 hover:bg-sky-600 text-white font-bold transition">Guardar agua</button>
</form>
{% endblock %}
