<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Be Water — encuentra tu agua{% endblock %}</title>
    <meta name="description" content="{{ meta_description | default('Catálogo abierto de aguas minerales españolas: composición, procedencia y recomendaciones.') }}">
    <meta name="theme-color" content="#0ea5e9">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ meta_description | default('Encuentra tu agua estés donde estés.') }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { backdrop-filter: blur(12px); background: rgba(255,255,255,.82); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<nav class="glass sticky top-0 z-40 border-b border-slate-200/60">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
        <a href="{{ url_for('index') }}" class="flex items-center gap-2 font-extrabold text-lg tracking-tight text-slate-900 shrink-0">
            <span class="text-xl">💧</span> Be Water
        </a>
        <div class="flex items-center gap-2 sm:gap-4 text-sm">
            <a href="{{ url_for('recommend') }}"
               class="font-medium text-slate-600 hover:text-sky-600 transition">📍 <span class="hidden sm:inline">Estoy de viaje</span></a>
            {% if nickname %}
                <a href="{{ url_for('add_water') }}"
                   class="font-medium text-slate-600 hover:text-sky-600 transition">＋ <span class="hidden sm:inline">Añadir agua</span></a>
                <form method="post" action="{{ url_for('logout') }}" class="flex items-center gap-2">
                    <span class="hidden sm:inline px-2.5 py-1 rounded-full bg-sky-100 text-sky-700 font-semibold">{{ nickname }}</span>
                    <button class="text-slate-400 hover:text-slate-600 transition" title="Salir">⏻</button>
                </form>
            {% else %}
                <form method="post" action="{{ url_for('login') }}" class="flex items-center gap-1.5">
                    <input name="nickname" placeholder="tu nick" required minlength="2" maxlength="20"
                           pattern="[a-zA-Z0-9_-]+"
                           class="w-24 sm:w-32 px-3 py-1.5 rounded-full border border-slate-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
                    <button class="px-3 py-1.5 rounded-full bg-sky-500 hover:bg-sky-600 text-white font-semibold text-sm transition">Entrar</button>
                </form>
            {% endif %}
        </div>
    </div>
</nav>

<main class="flex-1 w-full max-w-6xl mx-auto px-4 py-6 sm:py-10">
    {% block content %}{% endblock %}
</main>

<footer class="border-t border-slate-200 py-6 text-center text-xs text-slate-400">
    <p>Be Water, my friend 🥋 · catálogo colaborativo de aguas minerales</p>
    <p class="mt-1">datos de etiquetas — pueden contener errores · <span class="font-mono">{{ git_commit }}</span></p>
</footer>

</body>
</html>
